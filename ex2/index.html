<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cópia do formulário de cadastro do Trabalho 6, agora persistindo os dados em arquivo por meio de um script PHP.">
    <title>Trabalho 09 - Exercício 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/portal.css">
</head>
<body>
    <main class="container py-5">
        <section class="form-panel mx-auto">
            <h1>Cadastro de Cliente</h1>
            <p class="panel-copy">Preencha os dados fictícios abaixo. Ao cadastrar, os dados são gravados em arquivo pelo script <code>cadastra.php</code> e você será levado para a listagem segura dos cadastros.</p>

            <form action="cadastra.php" method="post" class="row g-3">
                <div class="col-8 col-md-8">
                    <label for="nome" class="form-label">Nome completo</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="Fulano" autocomplete="name" required autofocus>
                </div>

                <div class="col-4 col-md-4">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" autocomplete="off" required>
                </div>

                <div class="col-12 col-md-8">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="col-12 col-md-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" autocomplete="new-password" required>
                </div>

                <div class="col-12 col-md-2">
                    <label for="cep" class="form-label">CEP</label>
                    <input type="text" class="form-control" id="cep" name="cep" maxlength="9" placeholder="00000-000" autocomplete="postal-code" required>
                </div>

                <div class="col-12 col-md-10">
                    <label for="endereco" class="form-label">Endereço</label>
                    <input type="text" class="form-control" id="endereco" name="endereco" value="Avenida João Naves de Ávila" autocomplete="address-line1" required>
                </div>

                <div class="col-12 col-md-4">
                    <label for="bairro" class="form-label">Bairro</label>
                    <input type="text" class="form-control" id="bairro" name="bairro" autocomplete="address-level3" required>
                </div>

                <div class="col-12 col-md-4">
                    <label for="cidade" class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade" name="cidade" autocomplete="address-level2" required>
                </div>

                <div class="col-12 col-md-4">
                    <label for="estado" class="form-label">Estado</label>
                    <select class="form-select" id="estado" name="estado" autocomplete="address-level1" required>
                        <option value="">Selecione</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="GO">Goiás</option>
                        <option value="PR">Paraná</option>
                    </select>
                </div>

                <div class="col-12 pt-2">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                    <a class="btn btn-outline-secondary" href="lista-cadastros.php">Ver cadastros</a>
                    <a class="btn btn-outline-secondary" href="../index.html">Voltar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
